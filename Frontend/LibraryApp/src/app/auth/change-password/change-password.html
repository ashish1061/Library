<div class="change-password-container">
  
  <!-- Page Header -->
  <div class="page-header">
    <h1 class="page-title"><i class="fa fa-key"></i> Change Password</h1>
    <p class="page-subtitle">Update your account credentials securely.</p>
  </div>

  <div class="surface-card" style="padding: 1.5rem;">
    
    <div *ngIf="errorMessage" class="global-error" style="margin-bottom: 1rem; color: #dc3545; background: #f8d7da; padding: 0.5rem 1rem; border-radius: 8px; font-size: 0.9rem;">
      <i class="fa fa-exclamation-circle"></i> {{ errorMessage }}
    </div>
    <div *ngIf="successMessage" class="success-alert" style="margin-bottom: 1rem; color: #0f5132; background: #d1e7dd; padding: 0.5rem 1rem; border-radius: 8px; font-size: 0.9rem;">
      <i class="fa fa-check-circle"></i> {{ successMessage }}
    </div>

    <form [formGroup]="passwordForm" (ngSubmit)="onSubmit()">
      
      <div *ngIf="isAdmin" class="form-group" style="margin-bottom: 1rem; padding: 0.75rem 1rem; background: var(--surface-hover); border-radius: 6px; border: 1px solid var(--border-color);">
        <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer; margin: 0;">
          <input type="checkbox" [checked]="isAdminOverride" (change)="toggleAdminOverride($event)" style="accent-color: var(--primary); transform: scale(1.2);">
          <span style="font-weight: 600; color: var(--primary);">Admin Override <small style="display: block; color: var(--text-muted); font-weight: 400;">Change another user's password</small></span>
        </label>
      </div>

      <div class="form-group" style="margin-bottom: 1rem;">
        <label style="display: block; font-weight: 600; color: var(--text-color); margin-bottom: 0.25rem;">{{ isAdminOverride ? 'Target Employee ID' : 'Employee ID' }}</label>
        <div class="input-wrapper" style="position: relative;">
          <i class="fa fa-id-badge input-icon" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
          <input type="text" formControlName="EmpId" class="input-modern has-icon" style="width: 100%; padding: 0.6rem 1rem 0.6rem 2.5rem; border: 1px solid var(--border-color); border-radius: 6px; background: var(--bg-body); color: var(--text-color); transition: all 0.2s;" placeholder="e.g., E002">
        </div>
      </div>

      <div class="form-group" *ngIf="!isAdminOverride" style="margin-bottom: 1rem;">
        <label style="display: block; font-weight: 600; color: var(--text-color); margin-bottom: 0.25rem;">Old Password</label>
        <div class="input-wrapper" style="position: relative;">
          <i class="fa fa-lock input-icon" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
          <input type="password" formControlName="OldPassword" class="input-modern has-icon" style="width: 100%; padding: 0.6rem 1rem 0.6rem 2.5rem; border: 1px solid var(--border-color); border-radius: 6px; background: var(--bg-body); color: var(--text-color); transition: all 0.2s;" placeholder="Enter Old Password">
        </div>
      </div>
      
      <div class="form-group" style="margin-bottom: 1.25rem;">
        <label style="display: block; font-weight: 600; color: var(--text-color); margin-bottom: 0.25rem;">New Password</label>
        <div class="input-wrapper" style="position: relative;">
          <i class="fa fa-key input-icon" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
          <input type="password" formControlName="NewPassword" class="input-modern has-icon" style="width: 100%; padding: 0.6rem 1rem 0.6rem 2.5rem; border: 1px solid var(--border-color); border-radius: 6px; background: var(--bg-body); color: var(--text-color); transition: all 0.2s;" placeholder="Enter New Password">
        </div>
        <div class="error-text" *ngIf="passwordForm.get('NewPassword')?.invalid && passwordForm.get('NewPassword')?.touched" style="color: #dc3545; font-size: 0.8rem; margin-top: 0.2rem;">
          <div *ngIf="passwordForm.get('NewPassword')?.errors?.['required']"><i class="fa fa-exclamation-circle"></i> Password is required.</div>
          <div *ngIf="passwordForm.get('NewPassword')?.errors?.['minlength'] || passwordForm.get('NewPassword')?.errors?.['pattern']">
            <i class="fa fa-exclamation-circle"></i> Must be at least 8 chars with uppercase, lowercase, number & special char.
          </div>
        </div>
      </div>

      <div style="display: flex; justify-content: flex-end;">
        <button type="submit" class="btn-modern btn-primary" style="padding: 0.65rem 1.5rem; font-size: 0.95rem;" [disabled]="passwordForm.invalid || !passwordForm.get('EmpId')?.value || (!isAdminOverride && !passwordForm.get('OldPassword')?.value)">
          <i class="fa fa-save"></i> <span style="margin-left: 0.5rem;">Change Password</span>
        </button>
      </div>
    </form>
  </div>
</div>
