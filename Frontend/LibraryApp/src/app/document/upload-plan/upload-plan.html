<div class="max-w-2xl mx-auto mt-10 bg-white p-8 rounded-lg shadow-sm border border-gray-100">
  <h2 class="text-2xl font-semibold text-gray-800 mb-6">Execution Plan Submission</h2>
  
  <div class="border-2 border-dashed border-gray-300 rounded-lg p-10 text-center hover:bg-gray-50 transition-colors cursor-pointer relative">
    <input type="file" (change)="onFileSelected($event)" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" accept=".pdf,.doc,.docx,.txt" />
    <svg class="mx-auto h-12 w-12 text-gray-400" stroke="currentColor" fill="none" viewBox="0 0 48 48" aria-hidden="true">
      <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    </svg>
    <div class="mt-4 flex text-sm text-gray-600 justify-center">
      <span class="relative cursor-pointer bg-white rounded-md font-medium text-blue-600 hover:text-blue-500 focus-within:outline-none">
        <span>Upload a file</span>
      </span>
      <p class="pl-1">or drag and drop</p>
    </div>
    <p class="text-xs text-gray-500 mt-2">PDF, DOC, TXT up to 10MB</p>
  </div>

  <div *ngIf="selectedFile" class="mt-4 p-4 bg-blue-50 text-blue-700 rounded-md flex justify-between items-center">
    <span class="font-medium text-sm truncate">{{ selectedFile.name }}</span>
    <span class="text-xs text-blue-500">{{ (selectedFile.size / 1024 / 1024).toFixed(2) }} MB</span>
  </div>

  <div class="mt-6">
    <button 
      (click)="onUpload()" 
      [disabled]="!selectedFile || isUploading"
      class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 disabled:bg-gray-400 disabled:cursor-not-allowed transition-colors">
      <span *ngIf="!isUploading">Submit Execution Plan</span>
      <span *ngIf="isUploading">Uploading...</span>
    </button>
  </div>

  <div *ngIf="uploadMessage" class="mt-4 p-4 rounded-md text-sm font-medium" 
       [ngClass]="{'bg-green-50 text-green-700 border border-green-200': uploadMessage.includes('successfully'), 'bg-red-50 text-red-700 border border-red-200': !uploadMessage.includes('successfully')}">
    {{ uploadMessage }}
  </div>
</div>
